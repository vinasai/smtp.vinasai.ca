name: smtp.vinasai.ca deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build
          
      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy frontend build to server
        run: |
          scp -i ~/.ssh/id_rsa -r frontend/dist ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/frontend-dist-new

      - name: Deploy backend to server
        run: |
          set -e
          BACKEND_ENV_B64="$(printf '%s' "${{ vars.BACKEND_ENV }}" | base64 -w0)"
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          "WORK_DIR='${{ secrets.WORK_DIR }}' BACKEND_ENV_B64='$BACKEND_ENV_B64' bash -s" << 'EOF'
            set -e
            REPO_URL='git@github.com:vinasai/smtp.vinasai.ca.git'
            echo "--- Starting Deployment ---"

            # Setup GitHub SSH
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            # Fresh clone to temp dir
            TEMP_DIR="/tmp/smtp-deploy-$(date +%s)"
            echo "Cloning into $TEMP_DIR..."
            git clone "$REPO_URL" "$TEMP_DIR"

            # Replace app code (excluding frontend/dist)
            echo "Replacing app code..."
            # Preserve the current frontend/dist during wipe
            mkdir -p /tmp/frontend-dist-preserve
            cp -r "$WORK_DIR/frontend/dist" /tmp/frontend-dist-preserve/ 2>/dev/null || true

            rm -rf "$WORK_DIR"
            mkdir -p "$WORK_DIR"
            mv "$TEMP_DIR"/* "$WORK_DIR/"
            rm -rf "$TEMP_DIR"

            # Use the newly built dist from CI (copied via scp to /tmp/frontend-dist-new)
            echo "Restoring frontend dist..."
            mkdir -p "$WORK_DIR/frontend"
            if [ -d "/tmp/frontend-dist-new" ]; then
              echo "Using new CI-built dist..."
              cp -r /tmp/frontend-dist-new "$WORK_DIR/frontend/dist"
              rm -rf /tmp/frontend-dist-new
            else
              echo "WARNING: New dist not found, falling back to preserved dist..."
              cp -r /tmp/frontend-dist-preserve/dist "$WORK_DIR/frontend/dist"
            fi
            rm -rf /tmp/frontend-dist-preserve

            # Verify dist landed correctly
            echo "--- Verifying dist contents ---"
            ls -la "$WORK_DIR/frontend/dist/"

            # Install backend dependencies
            echo "Installing backend dependencies..."
            cd "$WORK_DIR/backend"
            npm install --omit=dev

            # Write .env
            echo "Writing .env..."
            echo "$BACKEND_ENV_B64" | base64 -d > .env
            chmod 600 .env

            # Start or restart with pm2
            echo "Restarting app with pm2..."
            pm2 describe smtp.vinasai.ca > /dev/null 2>&1 \
              && pm2 restart smtp.vinasai.ca --update-env \
              || pm2 start src/server.js --name smtp.vinasai.ca
            pm2 save

            # Reload Nginx to pick up new frontend files
            echo "Reloading Nginx..."
            sudo systemctl reload nginx

            echo "--- Deployment Finished Successfully ---"
          EOF
